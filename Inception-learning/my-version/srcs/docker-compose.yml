services:
  mariadb:
    container_name: mariadb

    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile

    env_file:
      - .env
    
    volumes:
      - mariadb:/var/lib/mysql
    
    networks:
      - inception

  wordpress:

  nginx:

networks:
  inception:
    driver: bridge

volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/mariadb

secrets: