services:
  mariadb:
    container_name: mariadb

    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile

    env_file:
      - .env
    
    secrets:
      - db_root_password
      - db_password
    
    volumes:
      - mariadb:/var/lib/mysql
    
    networks:
      - inception

  wordpress:
    container_name: wordpress

    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile

    env_file:
      - .env

    secrets:
      - db_password
      - credentials

    volumes:
      - wordpress:/var/www/html

    networks:
      - inception

    depends_on:
      - mariadb

  nginx:
    container_name: nginx

    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile

    env_file:
      - .env

    volumes:
      - wordpress:/var/www/html

    networks:
      - inception

    depends_on:
      - wordpress

    ports:
      - "443:443"

networks:
  inception:
    driver: bridge

volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/mariadb

  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/wordpress

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt

  db_password:
    file: ../secrets/db_password.txt

  credentials:
    file: ../secrets/credentials.txt